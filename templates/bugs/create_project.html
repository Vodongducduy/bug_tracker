{% extends 'base.html' %}

{% block title %}Tạo Dự Án Mới - Bug Tracker{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="header" style="margin-bottom: 2rem;">
        <h1>Tạo dự án mới</h1>
        <p style="color: var(--text-muted);">Khởi tạo không gian làm việc cho đội ngũ của bạn.</p>
    </div>

    <div class="glass-card">
        <form method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 1.5rem;">
                <label for="name" style="display: block; margin-bottom: 0.5rem; color: var(--text);">Tên dự án</label>
                <input type="text" id="name" name="name" required 
                       style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: var(--text);" 
                       placeholder="VD: Website Bán Hàng, App Quản Lý...">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="description" style="display: block; margin-bottom: 0.5rem; color: var(--text);">Mô tả</label>
                <textarea id="description" name="description" rows="4" 
                          style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: var(--text);" 
                          placeholder="Mục tiêu của dự án là gì?"></textarea>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <a href="{% url 'dashboard' %}" class="btn" style="background: rgba(255,255,255,0.1); color: var(--text); padding: 0.8rem 1.5rem; text-decoration: none; border-radius: 8px;">Hủy</a>
                <button type="submit" class="btn btn-primary" style="padding: 0.8rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; background: var(--primary); color: white; font-weight: 500;">Tạo dự án</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
